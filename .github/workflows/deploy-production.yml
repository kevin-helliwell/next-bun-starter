name: Production Deployment
env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
on:
  push:
    branches:
      - main
jobs:
  deploy_production:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Pull Vercel Environment Information
        run: bunx vercel@latest pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      # Tracked .env.development points at local Docker Postgres. Vercel CLI and
      # Prisma (dotenv) merge it over production vars, so migrations hit localhost.
      - name: Remove dev env files for production CI
        run: rm -f .env.development .env .env.local

      # vercel build reads .vercel/.env.production.local, not step env.
      # Sensitive Vercel vars (and NEXT_PUBLIC_* for prebuilt bundles) need to be
      # in that file and/or injected via vercel env run at build time.
      - name: Prepare production env for vercel build
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
          CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
        run: |
          env_file=".vercel/.env.production.local"
          if [ ! -f "$env_file" ]; then
            echo "::error::Missing $env_file after vercel pull."
            exit 1
          fi
          set_env_var() {
            key="$1"
            value="$2"
            if [ -z "${value:-}" ]; then
              return 0
            fi
            grep -v "^${key}=" "$env_file" > "${env_file}.tmp" || true
            mv "${env_file}.tmp" "$env_file"
            printf '%s="%s"\n' "$key" "$value" >> "$env_file"
            echo "Wrote $key from GitHub Actions secret into $env_file."
          }
          set_env_var DATABASE_URL "$DATABASE_URL"
          set_env_var NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY "$NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY"
          set_env_var CLERK_SECRET_KEY "$CLERK_SECRET_KEY"

      - name: Verify Clerk publishable key for production build
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
        run: |
          if [ -n "${NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY:-}" ]; then
            echo "NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY present in GitHub Actions secret."
            exit 0
          fi
          if [ -f .vercel/.env.production.local ] && grep -q '^NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY=.' .vercel/.env.production.local; then
            echo "NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY present in .vercel/.env.production.local."
            exit 0
          fi
          bunx vercel@latest env run --environment=production --token="$VERCEL_TOKEN" -- \
            sh -c 'if [ -z "${NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY:-}" ]; then
              echo "::error::NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY is required at build time for prebuilt deploys."
              echo "Add it to Vercel Production env vars and/or GitHub Actions secrets."
              exit 1
            fi'

      - name: Verify production DATABASE_URL
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          assert_non_local_url() {
            case "$1" in
              *localhost*|*127.0.0.1*)
                echo "::error::DATABASE_URL points at localhost ($1)."
                echo "Use your Neon production connection string, not the local Docker URL from .env.development."
                exit 1
                ;;
            esac
          }

          if [ -n "${DATABASE_URL:-}" ]; then
            assert_non_local_url "$DATABASE_URL"
            echo "Using DATABASE_URL from GitHub Actions secret."
            exit 0
          fi

          if [ ! -f .vercel/.env.production.local ]; then
            echo "::error::Missing .vercel/.env.production.local after vercel pull."
            exit 1
          fi
          # Neon/Marketplace DATABASE_URL is Sensitive — vercel pull leaves it empty.
          # vercel env run injects production secrets at runtime without writing them to disk.
          bunx vercel@latest env run --environment=production --token="$VERCEL_TOKEN" -- \
            sh -c 'if [ -z "${DATABASE_URL:-}" ]; then
              echo "::error::DATABASE_URL is not available for Vercel Production."
              echo "Add DATABASE_URL as a GitHub Actions secret (Neon main branch), or confirm it is enabled for Production in Vercel."
              exit 1
            fi
            case "$DATABASE_URL" in
              *localhost*|*127.0.0.1*)
                echo "::error::DATABASE_URL still points at localhost after removing dev env files."
                echo "Add DATABASE_URL as a GitHub Actions secret with your Neon production connection string."
                exit 1
                ;;
            esac'

      - name: Run Prisma Migrations
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          migrate() {
            if [ -n "${DATABASE_URL:-}" ]; then
              bunx prisma migrate deploy
            else
              bunx vercel@latest env run --environment=production --token="$VERCEL_TOKEN" -- \
                bunx prisma migrate deploy
            fi
          }
          for attempt in 1 2 3 4 5; do
            migrate && exit 0
            echo "Migration attempt ${attempt} failed; retrying in 10s..."
            sleep 10
          done
          exit 1
      - name: Build Project Artifacts
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
        run: |
          # Prebuilt deploys bake NEXT_PUBLIC_* at build time on the runner.
          # vercel env run injects Vercel Production vars (incl. Sensitive Clerk keys).
          bunx vercel@latest env run --environment=production --token="$VERCEL_TOKEN" -- \
            bunx vercel@latest build --prod --token="$VERCEL_TOKEN"
      - name: Deploy Project Artifacts to Vercel
        run: bunx vercel@latest deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
