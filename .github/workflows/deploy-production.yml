name: Production Deployment
env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
on:
  push:
    branches:
      - main
jobs:
  deploy_production:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Pull Vercel Environment Information
        run: bunx vercel@latest pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Verify production env from Vercel
        run: |
          if [ ! -f .vercel/.env.production.local ]; then
            echo "::error::Missing .vercel/.env.production.local after vercel pull."
            exit 1
          fi
          set -a
          source .vercel/.env.production.local
          set +a
          if [ -z "${DATABASE_URL:-}" ]; then
            echo "::error::DATABASE_URL is not set in Vercel Production env vars."
            echo "Add it at: Vercel project → Settings → Environment Variables → Production"
            echo "Use your hosted Postgres connection string (Neon, Vercel Postgres, etc.)."
            exit 1
          fi

      - name: Run Prisma Migrations
        run: |
          set -a
          source .vercel/.env.production.local
          set +a
          for attempt in 1 2 3 4 5; do
            bunx prisma migrate deploy && exit 0
            echo "Migration attempt ${attempt} failed; retrying in 10s..."
            sleep 10
          done
          exit 1
      - name: Build Project Artifacts
        run: bunx vercel@latest build --prod --token=${{ secrets.VERCEL_TOKEN }}
      - name: Deploy Project Artifacts to Vercel
        run: bunx vercel@latest deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
