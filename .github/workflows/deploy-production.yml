name: Production Deployment
env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
on:
  push:
    branches:
      - main
jobs:
  deploy_production:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Pull Vercel Environment Information
        run: bunx vercel@latest pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Verify production DATABASE_URL via Vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          if [ ! -f .vercel/.env.production.local ]; then
            echo "::error::Missing .vercel/.env.production.local after vercel pull."
            exit 1
          fi
          # Neon/Marketplace DATABASE_URL is Sensitive — vercel pull leaves it empty.
          # vercel env run injects production secrets at runtime without writing them to disk.
          bunx vercel@latest env run --environment=production --token="$VERCEL_TOKEN" -- \
            sh -c 'if [ -z "${DATABASE_URL:-}" ]; then
              echo "::error::DATABASE_URL is not available for Vercel Production."
              echo "In Vercel → Project → Settings → Environment Variables, confirm DATABASE_URL is enabled for Production."
              echo "If Neon is connected, re-save the integration or add DATABASE_URL manually for Production."
              exit 1
            fi'

      - name: Run Prisma Migrations
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          for attempt in 1 2 3 4 5; do
            bunx vercel@latest env run --environment=production --token="$VERCEL_TOKEN" -- \
              bunx prisma migrate deploy && exit 0
            echo "Migration attempt ${attempt} failed; retrying in 10s..."
            sleep 10
          done
          exit 1
      - name: Build Project Artifacts
        run: bunx vercel@latest build --prod --token=${{ secrets.VERCEL_TOKEN }}
      - name: Deploy Project Artifacts to Vercel
        run: bunx vercel@latest deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
