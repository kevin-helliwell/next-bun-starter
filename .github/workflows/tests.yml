name: Tests

on:
  pull_request:
    paths: &test-paths
      # GitHub path filters do not support brace expansion (e.g. *.{ts,tsx})
      - '**/*.ts'
      - '**/*.tsx'
      - '**/*.js'
      - '**/*.jsx'
      - '**/*.css'
      - '**/*.scss'
      # Shared UI components and route-local _components folders
      - 'app/components/**'
      - 'app/**/_components/**'
      - 'tests/**'
      - 'vitest.config.mts'
      - 'package.json'
      - 'bun.lock'
      - 'prisma/**'
      - 'cypress/**'
      - '.github/workflows/tests.yml'
      - 'cypress.config.ts'
  push:
    branches: [main]
    paths: *test-paths

jobs:
  unit:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Cache Bun dependencies
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('package.json', 'bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Cache Prisma generated files
        id: cache-prisma
        uses: actions/cache@v5
        with:
          path: prisma/generated
          key: ${{ runner.os }}-prisma-${{ hashFiles('prisma/schema.prisma', 'package.json', 'bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-prisma-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Generate Prisma Client (if cache miss)
        if: steps.cache-prisma.outputs.cache-hit != 'true'
        run: bunx prisma generate

      - name: Run unit tests
        run: bun run test:unit --run
        env:
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY_TEST }}

  e2e:
    # Skip e2e tests for Dependabot PRs since they don't have access to secrets
    if: github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:latest
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
          POSTGRES_DB: db
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v7

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Cache Bun dependencies
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('package.json', 'bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Cache Prisma generated files
        id: cache-prisma
        uses: actions/cache@v5
        with:
          path: prisma/generated
          key: ${{ runner.os }}-prisma-${{ hashFiles('prisma/schema.prisma', 'package.json', 'bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-prisma-

      - name: Cache Next.js build cache
        uses: actions/cache@v5
        with:
          path: |
            .next/cache
            .next/standalone
            .next/static
          key: ${{ runner.os }}-nextjs-${{ hashFiles('package.json', 'bun.lock') }}-${{ hashFiles('**/*.{js,jsx,ts,tsx}') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('package.json', 'bun.lock') }}-

      - name: Cache Cypress binary
        uses: actions/cache@v5
        with:
          path: ~/.cache/Cypress
          key: ${{ runner.os }}-cypress-${{ hashFiles('package.json', 'bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-cypress-

      - name: Install Dependencies
        run: bun install --frozen-lockfile

      - name: Verify E2E secrets
        env:
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY_TEST }}
          CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY_TEST }}
          CYPRESS_CLERK_TEST_PASSWORD: ${{ secrets.CYPRESS_CLERK_TEST_PASSWORD }}
        run: |
          missing=0
          check() {
            if [ -z "$2" ]; then
              echo "::error::Missing repository secret: $1"
              missing=1
            fi
          }
          check NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY_TEST "$NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY"
          check CLERK_SECRET_KEY_TEST "$CLERK_SECRET_KEY"
          check CYPRESS_CLERK_TEST_PASSWORD "$CYPRESS_CLERK_TEST_PASSWORD"
          if [ "$missing" -eq 1 ]; then
            echo ""
            echo "Add secrets at: Settings → Secrets and variables → Actions"
            echo "Use the same Clerk test keys as local .env.local (see README)."
          fi
          exit $missing

      - name: Generate Prisma Client (if cache miss)
        if: steps.cache-prisma.outputs.cache-hit != 'true'
        run: bunx prisma generate
        env:
          DATABASE_URL: 'postgres://postgres:postgres@localhost/db'

      - name: Run Prisma Migrations
        run: bunx prisma migrate deploy
        env:
          DATABASE_URL: 'postgres://postgres:postgres@localhost/db'

      - name: Seed Database
        run: bunx prisma db seed
        env:
          DATABASE_URL: 'postgres://postgres:postgres@localhost/db'

      - name: Build and Start Next.js App
        run: |
          bun run build
          nohup bun run start &
        env:
          DATABASE_URL: 'postgres://postgres:postgres@localhost/db'
          CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY_TEST }}
          NEXT_PUBLIC_BASE_URL: http://localhost:3000
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY_TEST }}
          CYPRESS_CLERK_TEST_PASSWORD: ${{ secrets.CYPRESS_CLERK_TEST_PASSWORD }}

      - name: Wait for Next.js App to be Ready
        run: |
          bunx wait-on http-get://127.0.0.1:3000 --timeout 60000 --httpTimeout 5000 || {
            echo "::error::Server did not respond with HTTP 2xx. Common cause: missing or invalid Clerk keys."
            curl -sv http://127.0.0.1:3000/ 2>&1 | tail -20 || true
            exit 1
          }

      - name: Run Cypress E2E Tests
        run: bun run test:e2e:run -- --env CYPRESS_CLERK_TEST_PASSWORD=${{ secrets.CYPRESS_CLERK_TEST_PASSWORD }}
        timeout-minutes: 10
        env:
          DATABASE_URL: 'postgres://postgres:postgres@localhost/db'
          CYPRESS_CLERK_TEST_PASSWORD: ${{ secrets.CYPRESS_CLERK_TEST_PASSWORD }}
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY_TEST }}
          CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY_TEST }}
